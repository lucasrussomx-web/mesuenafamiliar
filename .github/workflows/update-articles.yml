name: Actualizar artículos de LinkedIn

on:
  workflow_dispatch:
    inputs:
      article_url:
        description: "URL del artículo de LinkedIn (https://www.linkedin.com/pulse/...)"
        required: true
        type: string

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Instalar dependencias
        run: pip install requests beautifulsoup4

      - name: Agregar artículo
        run: python scripts/update_articles.py "${{ inputs.article_url }}"

      - name: Confirmar y publicar cambios
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add web/articulos.json
          if git diff --staged --quiet; then
            echo "Sin cambios (el artículo ya existía o no se encontraron metadatos)."
          else
            git commit -m "Artículo: $(python -c "import json; a=json.load(open('web/articulos.json')); print(a[0]['titulo'][:60])")"
            git push
          fi
