name: Actualizar artículos de LinkedIn

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      article_url:
        description: "URL del artículo de LinkedIn (https://www.linkedin.com/pulse/...)"
        required: true
        type: string

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  update-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Instalar dependencias
        run: pip install requests beautifulsoup4

      - name: Agregar artículo
        if: github.event_name == 'workflow_dispatch'
        run: python scripts/update_articles.py "${{ inputs.article_url }}"

      - name: Confirmar y publicar cambios
        if: github.event_name == 'workflow_dispatch'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add web/articulos.json
          if git diff --staged --quiet; then
            echo "Sin cambios (el artículo ya existía)."
          else
            git commit -m "Artículo: $(python -c "import json; a=json.load(open('web/articulos.json')); print(a[0]['titulo'][:60])")"
            git push
          fi

      - name: Configurar Pages
        uses: actions/configure-pages@v5

      - name: Subir carpeta web
        uses: actions/upload-pages-artifact@v3
        with:
          path: web/

      - name: Publicar en GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
